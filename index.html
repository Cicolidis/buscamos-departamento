<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Búsqueda de deptos · Juju & Laura</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com/3.4.1"></script>
<!-- React + ReactDOM (UMD globals) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Firebase (compat → global `firebase`) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f1115;
    --surface: #181b22;
    --surface2: #20242d;
    --border: #2b303b;
    --text: #e7e9ee;
    --muted: #9aa3b2;
    --primary: #2dd4bf;
    --amber: #f5b301;
  }
  html, body { background: var(--bg); color: var(--text); }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; }
  *::-webkit-scrollbar { height: 10px; width: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #2b303b; border-radius: 6px; }
  .card-drag { opacity: 0.4; }
  .col-over { outline: 2px dashed var(--primary); outline-offset: -4px; }
  input, textarea, select {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; width: 100%; font-size: 14px; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--primary); }
  label { font-size: 12px; color: var(--muted); display:block; margin-bottom: 4px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div id="root" class="min-h-screen"></div>

<script src="app.js"></script>
</body>
</html>
